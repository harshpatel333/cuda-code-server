# cuda-code-server sshd override — hardened baseline for Remote-SSH access.
# Loaded via the distro's default /etc/ssh/sshd_config Include directive.

PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
UsePAM no
AllowUsers coder

AuthorizedKeysFile /home/coder/.ssh/authorized_keys

# Host keys live on the persistent /home/coder volume so reconnects don't
# trigger "host key changed" warnings after container recreation.
HostKey /home/coder/.ssh/host_keys/ssh_host_ed25519_key
HostKey /home/coder/.ssh/host_keys/ssh_host_rsa_key

X11Forwarding no
AcceptEnv LANG LC_*
Subsystem sftp /usr/lib/openssh/sftp-server

# Keep Remote-SSH connections from VS Code / Cursor alive through idle proxies.
ClientAliveInterval 60
ClientAliveCountMax 5
