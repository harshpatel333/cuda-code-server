# Dokploy Raw Compose deployment for cuda-code-server.
#
# Paste into Dokploy's Compose service (Raw provider), set PASSWORD in the
# Environment tab, and configure your domain in the Domains tab pointing at
# port 8080. Do NOT add Traefik labels here — Dokploy wires them from the GUI.
#
# See docs/dokploy.md for the full walkthrough.

services:
  devcontainer:
    image: ghcr.io/harshpatel333/cuda-code-server:latest
    restart: unless-stopped
    environment:
      # Required. Set in Dokploy's Environment tab — never commit this.
      PASSWORD: ${PASSWORD:?PASSWORD must be set}
      # Optional — leave unset for passwordless sudo inside the container.
      SUDO_PASSWORD: ${SUDO_PASSWORD:-}
      TZ: ${TZ:-UTC}
      # NVIDIA runtime plumbing.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # ---- Remote-SSH (optional) ------------------------------------------
      # Lets VS Code Desktop / Cursor / Windsurf attach via Remote-SSH.
      # Full walk-through: docs/dokploy.md § "Enabling Remote-SSH".
      # Uncomment the 3 lines below, paste your pubkey, and also uncomment
      # the `ports: "2222:2222"` block further down.
      # ENABLE_SSHD: "true"
      # SSH_PORT: "2222"
      # SSH_AUTHORIZED_KEYS: "ssh-ed25519 AAAAC3Nz... you@laptop"
      # ---------------------------------------------------------------------
    expose:
      - "8080"
    # ---- Remote-SSH port (optional) -------------------------------------
    # Uncomment when enabling ENABLE_SSHD above. This bypasses Traefik and
    # maps port 2222 directly on the host. Steps on the Dokploy host:
    #   1. `sudo ufw allow from <your-laptop-ip>/32 to any port 2222 proto tcp`
    #   2. Add DNS: `ssh.<your-domain>` A-record → this host's IP.
    #   3. Redeploy; from your laptop: `ssh -p 2222 coder@ssh.<your-domain>`
    # For Traefik TCP entrypoint routing instead, see docs/remote-ssh.md.
    # ports:
    #   - "2222:2222"
    volumes:
      - home:/home/coder
      - project:/home/coder/project
      # Enables `docker` CLI against the host daemon. Remove if you don't need it —
      # it grants root-on-host to anyone with code-server access.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dokploy-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  home:
    # Prefixing with COMPOSE_PROJECT_NAME avoids collisions across Dokploy redeploys.
    name: ${COMPOSE_PROJECT_NAME:-cuda-code-server}-home
  project:
    name: ${COMPOSE_PROJECT_NAME:-cuda-code-server}-project

networks:
  dokploy-network:
    external: true
