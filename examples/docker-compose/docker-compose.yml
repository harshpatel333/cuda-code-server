# Standalone Docker Compose deployment for cuda-code-server.
#
# No reverse proxy; port 8080 is exposed directly on the host. Suitable for a
# dev box on a trusted network. For anything internet-facing, front it with a
# TLS-terminating proxy and an auth layer (see SECURITY.md).
#
# Usage:
#   PASSWORD=$(openssl rand -base64 24) docker compose up -d

services:
  devcontainer:
    image: ghcr.io/harshpatel333/cuda-code-server:latest
    restart: unless-stopped
    environment:
      PASSWORD: ${PASSWORD:?PASSWORD must be set}
      SUDO_PASSWORD: ${SUDO_PASSWORD:-}
      TZ: ${TZ:-UTC}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # ---- Remote-SSH (optional) ------------------------------------------
      # Lets VS Code Desktop / Cursor / Windsurf attach via Remote-SSH.
      # Full walk-through: docs/remote-ssh.md. Quick version:
      #   1. Uncomment the 3 env vars + the `2222:2222` port below.
      #   2. Restart: `docker compose up -d`.
      #   3. From your laptop: `ssh -p 2222 coder@<host>`.
      # For a remote Docker host (not localhost), add a DNS A record first
      # (e.g., `ssh.example.com`) and open port 2222 on the host firewall.
      # ENABLE_SSHD: "true"
      # SSH_PORT: "2222"
      # SSH_AUTHORIZED_KEYS: "ssh-ed25519 AAAAC3Nz... you@laptop"
      # ---------------------------------------------------------------------
    ports:
      - "8080:8080"
      # - "2222:2222"         # uncomment with ENABLE_SSHD above
    volumes:
      - home:/home/coder
      - project:/home/coder/project
      # Comment the next line out if you don't need `docker` CLI inside the container.
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  home:
  project:
