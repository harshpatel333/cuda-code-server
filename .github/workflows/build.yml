name: Build and publish images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required for GHCR push via GITHUB_TOKEN

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.cuda_short }} / py${{ matrix.python }}
    runs-on: ubuntu-latest
    # Pipe Docker Hub creds through env at the job level: `secrets.*` is not
    # available in step-level `if:` conditions (GitHub actionlint-enforced),
    # but `env.*` is. This lets the Docker Hub login/push stay optional.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: "12.6.1"
            cuda_short: "12.6"
            python: "3.12"
            py_short: "312"
            torch_cuda: "cu126"
            default: true
          - cuda: "12.6.1"
            cuda_short: "12.6"
            python: "3.11"
            py_short: "311"
            torch_cuda: "cu126"
            default: false
          - cuda: "12.4.1"
            cuda_short: "12.4"
            python: "3.12"
            py_short: "312"
            torch_cuda: "cu124"
            default: false
          - cuda: "12.4.1"
            cuda_short: "12.4"
            python: "3.11"
            py_short: "311"
            torch_cuda: "cu124"
            default: false
    steps:
      - uses: actions/checkout@v4

      # Build the images list dynamically so Docker Hub is only added when the
      # DOCKERHUB_USERNAME secret is set. Keeps the workflow green for PRs from
      # forks and for maintainers who haven't set up Docker Hub yet.
      - name: Compute image refs
        id: refs
        run: |
          {
            echo 'images<<EOF'
            echo "ghcr.io/${GITHUB_REPOSITORY}"
            if [ -n "${DOCKERHUB_USERNAME:-}" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/cuda-code-server"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        env:
          VARIANT: ${{ matrix.cuda_short }}-py${{ matrix.py_short }}
        with:
          images: ${{ steps.refs.outputs.images }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ env.VARIANT }}
            type=raw,value=latest,enable=${{ matrix.default && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}-${{ env.VARIANT }}
            type=semver,pattern={{major}}.{{minor}}-${{ env.VARIANT }}
            type=sha,prefix=sha-,suffix=-${{ env.VARIANT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda }}
            PYTHON_VERSION=${{ matrix.python }}
            TORCH_CUDA=${{ matrix.torch_cuda }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope cache by ref_name so parallel main-branch + tag pushes don't
          # race on the same blob (caused BlobNotFound in the v0.1.0 release
          # build). Fall back to main's cache for cold-start tag builds so we
          # still get cache hits on the first push of a new tag.
          cache-from: |
            type=gha,scope=${{ github.ref_name }}-${{ matrix.cuda_short }}-py${{ matrix.py_short }}
            type=gha,scope=main-${{ matrix.cuda_short }}-py${{ matrix.py_short }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.cuda_short }}-py${{ matrix.py_short }}

  update-dockerhub-description:
    name: Sync README to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Same env-via-job trick as the build job — secrets aren't allowed in `if:`.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Docker Hub description
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/cuda-code-server
          short-description: GPU-accelerated VS Code server with CUDA, PyTorch, and Claude Code preinstalled.
